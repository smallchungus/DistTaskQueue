apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-test
  namespace: disttaskqueue
spec:
  replicas: 1
  selector:
    matchLabels: { app: worker-test }
  template:
    metadata:
      labels: { app: worker-test }
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: worker
          image: ghcr.io/smallchungus/disttaskqueue-api:latest
          imagePullPolicy: Always
          command: ["/worker"]
          args: ["--stage=test"]
          envFrom:
            - configMapRef: { name: dtq-config }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }

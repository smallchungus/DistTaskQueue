apiVersion: v1
kind: Service
metadata:
  name: gotenberg
  namespace: disttaskqueue
spec:
  selector: { app: gotenberg }
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotenberg
  namespace: disttaskqueue
spec:
  replicas: 1
  selector:
    matchLabels: { app: gotenberg }
  template:
    metadata:
      labels: { app: gotenberg }
    spec:
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:8
          ports: [{ containerPort: 3000 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 512Mi }

# Published-image stack. To build from source instead:
#   docker compose -f docker-compose.yaml -f docker-compose.build.yaml up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dtq
      POSTGRES_USER: dtq
      POSTGRES_PASSWORD: dtq
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtq"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3000:3000"

  api:
    image: ghcr.io/smallchungus/disttaskqueue-api:latest
    env_file:
      - path: .env
        required: false
    environment:
      API_ADDR: ":8080"
      DATABASE_URL: "postgres://dtq:dtq@postgres:5432/dtq?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker-fetch:
    image: ghcr.io/smallchungus/disttaskqueue-api:latest
    entrypoint: ["/worker"]
    command: ["--stage=fetch"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://dtq:dtq@postgres:5432/dtq?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - dtq-data:/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker-render:
    image: ghcr.io/smallchungus/disttaskqueue-api:latest
    entrypoint: ["/worker"]
    command: ["--stage=render"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://dtq:dtq@postgres:5432/dtq?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      GOTENBERG_URL: "http://gotenberg:3000"
    volumes:
      - dtq-data:/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      gotenberg:
        condition: service_started

  worker-upload:
    image: ghcr.io/smallchungus/disttaskqueue-api:latest
    entrypoint: ["/worker"]
    command: ["--stage=upload"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://dtq:dtq@postgres:5432/dtq?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - dtq-data:/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  scheduler:
    image: ghcr.io/smallchungus/disttaskqueue-api:latest
    entrypoint: ["/scheduler"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://dtq:dtq@postgres:5432/dtq?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  sweeper:
    image: ghcr.io/smallchungus/disttaskqueue-api:latest
    entrypoint: ["/sweeper"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://dtq:dtq@postgres:5432/dtq?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  oauth-setup:
    image: ghcr.io/smallchungus/disttaskqueue-api:latest
    profiles: ["setup"]
    entrypoint: ["/oauth-setup"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://dtq:dtq@postgres:5432/dtq?sslmode=disable"
    ports:
      - "8888:8888"
    depends_on:
      postgres: { condition: service_healthy }

  backfill:
    image: ghcr.io/smallchungus/disttaskqueue-api:latest
    profiles: ["backfill"]
    entrypoint: ["/backfill"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://dtq:dtq@postgres:5432/dtq?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  pg-data:
  redis-data:
  dtq-data: